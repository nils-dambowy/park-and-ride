<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park & Ride / Bike & Ride Calculator | Minimalist Intermodal Planner</title>
  <meta name="description" content="Minimalistische, blitzschnelle intermodale Routenplanung (P+R / B+R) mit Echtzeit-Stau, ÖPNV DB Navigator Itinerary und CO₂-Rechner." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Global Route Calculation Loading Banner -->
  <div id="global-loading-banner" class="loading-banner" style="display: none;">
    <div class="spinner-small"></div>
    <span id="loading-banner-text">Berechne intermodale Route...</span>
  </div>

  <!-- App Header -->
  <header class="app-header">
    <div class="brand-title">
      <svg width="22" height="22" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" rx="24" fill="#8b5cf6"/>
        <circle cx="50" cy="50" r="24" fill="#fff"/>
      </svg>
      <span class="brand-name">P+R Calculator</span>
    </div>

    <nav class="header-nav">
      <button class="nav-btn" id="header-status-page-btn">🟢 Status</button>
      <button class="nav-btn" id="header-admin-direct-btn">👑 Admin</button>
      <button class="nav-btn" id="toggle-outdoor-mode">☀️ Outdoor</button>
      <button class="nav-btn" id="open-saved-routes">⭐ Gemerkt</button>
      <div id="auth-header-btn-container"></div>
    </nav>
  </header>

  <!-- Main Layout Grid -->
  <main class="main-layout">
    <!-- Left Sidebar Search Panel -->
    <aside class="search-sidebar glass-panel">
      <div class="sidebar-header">
        <h1>Routenplaner</h1>
        <p class="subtitle">1. Meile + ÖPNV-Hauptstrecke verknüpfen</p>
      </div>

      <form id="route-planner-form">
        <!-- Start Location -->
        <div class="form-group">
          <label for="origin-input">📍 Start (1. Meile)</label>
          <div class="input-with-btn">
            <input type="text" id="origin-input" class="form-control" placeholder="Startadresse oder Ort eingeben..." required />
            <button type="button" class="btn-icon" id="voice-search-btn" title="Spracheingabe">🎙️</button>
          </div>
          <div id="origin-autocomplete" class="autocomplete-container"></div>
        </div>

        <!-- Destination Location -->
        <div class="form-group">
          <label for="dest-input">🏁 Ziel</label>
          <input type="text" id="dest-input" class="form-control" placeholder="Zielbahnhof oder Adresse..." required />
          <div id="dest-autocomplete" class="autocomplete-container"></div>
        </div>

        <!-- Mode Segmented Control -->
        <div class="form-group">
          <label>Fortbewegung (1. Meile)</label>
          <div class="mode-segmented-control" id="mode-selector">
            <button type="button" class="mode-btn active" data-mode="smart">✨ Smart</button>
            <button type="button" class="mode-btn" data-mode="car_pt">🚗 Auto</button>
            <button type="button" class="mode-btn" data-mode="bike_pt">🚲 Rad</button>
            <button type="button" class="mode-btn" data-mode="walk_pt">🚶 Fuß</button>
          </div>
        </div>

        <!-- Options: Traffic -->
        <div class="form-group checkbox-group">
          <label class="toggle-switch">
            <input type="checkbox" id="traffic-toggle" checked />
            <span>🚗 Live-Verkehr & Stau einberechnen</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="calculate-btn">
          Route berechnen
        </button>
      </form>

      <!-- Quick Preset Selection -->
      <div class="presets-section">
        <span class="presets-label">Schnellauswahl:</span>
        <div class="presets-row" id="presets-container"></div>
      </div>
    </aside>

    <!-- Main Dashboard Area -->
    <section class="dashboard-content">
      <!-- Leaflet Interactive Map -->
      <div class="map-card glass-panel" id="map-card">
        <div id="leaflet-map-container"></div>
      </div>

      <!-- Overview KPI Cards -->
      <div id="overview-dashboard"></div>

      <!-- Mode Comparison Cards -->
      <div id="comparison-cards"></div>

      <!-- Step-by-Step Timeline -->
      <div id="timeline-section"></div>

      <!-- Station Departure Board -->
      <div id="departure-board-section"></div>

      <!-- Bottom Actions Bar -->
      <div class="actions-row">
        <button class="btn btn-outline btn-sm" id="open-cost-modal">💰 Spar-Rechner</button>
        <button class="btn btn-outline btn-sm" id="save-route-btn">⭐ Route speichern</button>
        <button class="btn btn-outline btn-sm" id="export-calendar-btn">📅 In Kalender eintragen</button>
      </div>
    </section>
  </main>

  <!-- App Footer -->
  <footer class="app-footer">
    <span>Park & Ride / Bike & Ride Calculator &copy; 2026</span>
    <div class="system-status-badge" id="footer-system-status">
      <span class="status-dot dot-green"></span>
      <span>System Status: 100% Operational</span>
    </div>
  </footer>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Drawer Container -->
  <div id="drawer-container"></div>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Application Main Entry Script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
